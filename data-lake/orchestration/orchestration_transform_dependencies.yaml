# This file defines ETL stage dependencies only
# It is used by orchestration to decide whether a stage can continue or should be skipped
# based on the success of its upstream dependencies
# Shared upstream stages are defined separately when they are reused by multiple entities
# Entity-specific Horizon/SB stages sit under the entity they belong to

entities:
  nsip-data:
    standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: NSIPData
      depends_on: []
  aie-document:
    standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: AIEDocumentData
      depends_on: []
    harmonised:
      kwargs:
        entity_stage_name: AIE Document Harmonisation Process
        entity_name: AIEDocumentData
      depends_on:
      - aie-document.standardised
  nsip-project:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: nsip-project
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: nsip-project
      depends_on:
      - nsip-project.service_bus_standardised
    harmonised:
      kwargs:
        entity_stage_name: NSIP Project Harmonisation Process
        entity_name: nsip-project
      depends_on:
      - nsip-data.standardised
      - nsip-project.service_bus_harmonised
    curated:
      kwargs:
        entity_stage_name: NSIP Project Curated Process
        entity_name: nsip-project
      depends_on:
      - nsip-project.harmonised
  nsip-meeting:
    harmonised:
      kwargs:
        entity_stage_name: NSIP Meeting Harmonisation Process
        entity_name: nsip-meeting
      depends_on:
      - nsip-project.service_bus_harmonised
    curated:
      kwargs:
        entity_stage_name: NSIP Meeting Curated Process
        entity_name: nsip-meeting
      depends_on:
      - nsip-meeting.harmonised
  nsip-invoice:
    harmonised:
      kwargs:
        entity_stage_name: NSIP Invoice Harmonisation Process
        entity_name: nsip-invoice
      depends_on:
      - nsip-project.service_bus_harmonised
    curated:
      kwargs:
        entity_stage_name: NSIP Invoice Curated Process
        entity_name: nsip-invoice
      depends_on:
      - nsip-invoice.harmonised
  nsip-exam-timetable:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: nsip-exam-timetable
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: nsip-exam-timetable
      depends_on:
      - nsip-exam-timetable.service_bus_standardised
    horizon_standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: ExaminationTimetable
      depends_on: []
    harmonised:
      kwargs:
        entity_stage_name: NSIP Exam Timetable Harmonisation Process
        entity_name: nsip-exam-timetable
      depends_on:
      - nsip-exam-timetable.service_bus_harmonised
      - nsip-exam-timetable.horizon_standardised
      - nsip-data.standardised
    curated:
      kwargs:
        entity_stage_name: NSIP Exam Timetable Curated Process
        entity_name: nsip-exam-timetable
      depends_on:
      - nsip-exam-timetable.harmonised
      - nsip-project.curated
  nsip-document:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: nsip-document
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: nsip-document
      depends_on:
      - nsip-document.service_bus_standardised
    horizon_standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: DocumentMetaData
      depends_on: []
    harmonised:
      kwargs:
        entity_stage_name: NSIP Document Harmonisation Process
        entity_name: nsip-document
      depends_on:
      - nsip-document.service_bus_harmonised
      - nsip-document.horizon_standardised
      - aie-document.harmonised
    curated:
      kwargs:
        entity_stage_name: NSIP Document Curated Process
        entity_name: nsip-document
      depends_on:
      - nsip-document.harmonised
      - nsip-project.curated
  # main_sourcesystem_fact is referenced by nsip-representation but the notebook
  # and pipeline for it are archived and appear to have been used as a one time
  # setup/load to create a lookup/reference table.
  nsip-representation:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: nsip-representation
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: nsip-representation
      depends_on:
      - nsip-representation.service_bus_standardised
    horizon_standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: NSIPReleventRepresentation
      depends_on: []
    harmonised:
      kwargs:
        entity_stage_name: NSIP Representation Harmonisation Process
        entity_name: nsip-representation
      depends_on:
      - nsip-representation.service_bus_harmonised
      - nsip-representation.horizon_standardised
    curated:
      kwargs:
        entity_stage_name: NSIP Representation Curated Process
        entity_name: nsip-representation
      depends_on:
      - nsip-representation.harmonised
  nsip-s51-advice:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: s51-advice
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: s51-advice
      depends_on:
      - nsip-s51-advice.service_bus_standardised
    horizon_standardised:
      kwargs:
        entity_stage_name: Horizon Standardisation Process
        entity_name: NSIPAdvice
      depends_on: []
    harmonised:
      kwargs:
        entity_stage_name: NSIP S51 Advice Harmonisation Process
        entity_name: nsip-s51-advice
      depends_on:
      - nsip-s51-advice.service_bus_harmonised
      - nsip-s51-advice.horizon_standardised
    curated:
      kwargs:
        entity_stage_name: NSIP S51 Advice Curated Process
        entity_name: nsip-s51-advice
      depends_on:
      - nsip-s51-advice.harmonised
  nsip-subscription:
    service_bus_standardised:
      kwargs:
        entity_stage_name: Service Bus Standardisation Process
        entity_name: nsip-subscription
      depends_on: []
    service_bus_harmonised:
      kwargs:
        entity_stage_name: Service Bus Harmonisation Process
        entity_name: nsip-subscription
      depends_on:
      - nsip-subscription.service_bus_standardised
    curated:
      kwargs:
        entity_stage_name: NSIP Subscription Curated Process
        entity_name: nsip-subscription
      depends_on:
      - nsip-subscription.service_bus_harmonised
