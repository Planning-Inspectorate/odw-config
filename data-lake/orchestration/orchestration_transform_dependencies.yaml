# This file defines ETL stage dependencies only
# It is used by orchestration to decide whether a stage can continue or should be skipped
# based on the success of its upstream dependencies
# Shared upstream stages are defined separately when they are reused by multiple entities
# Entity-specific Horizon/SB stages sit under the entity they belong to

entities:
  entity-a:
    standardised:
      kwargs:
        etl_process_name: Fake Successful ETL Process
      depends_on: []
    harmonised:
      kwargs:
        etl_process_name: Fake Successful ETL Process
      depends_on: [entity-a.standardised]
    curated:
      kwargs:
        etl_process_name: Fake Successful ETL Process
      depends_on: [entity-a.harmonised]
  entity-b:
    standardised:
      kwargs:
        etl_process_name: Fake Successful ETL Process
      depends_on: []
    harmonised:
      kwargs:
        etl_process_name: Fake Failed ETL Process
      depends_on: [entity-b.standardised]
    curated:
      kwargs:
        etl_process_name: Fake Successful ETL Process
      depends_on: [entity-b.harmonised]
