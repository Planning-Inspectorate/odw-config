# Anonymisation Policy Configuration
# 
# DEPLOYMENT NOTE:
# This policy file should be deployed to the Azure storage container:
#   abfss://odw-config@<storage-account>/anonymisation/policy.yaml
#
# The AnonymisationConfig.load_config() method in odw/core/anonymisation/config.py
# can load this policy to control which Purview classifications trigger anonymisation.
#
# If no classification_allowlist is specified, the AnonymisationEngine will apply
# anonymisation to ALL classified columns. By specifying an allowlist, you limit
# anonymisation to only the classifications listed below.

classification_allowlist:
  - "MICROSOFT.PERSONAL.EMAIL"
  - "MICROSOFT.PERSONAL.NAME"
  - "NI Number"
  - "Birth Date"
  - "Date of Birth"
  - "Person's Age"
  - "Annual Salary"
  - "Email Address"
  - "First Name"
  - "Last Name"

# Default seed column used for deterministic anonymisation.
# Must be a unique, stable identifier present in the DataFrame.
# Override per-entity using entity_seed_columns below.
seed_column: "id"

# Per-entity seed column overrides.
# Use the unique identifier column for each entity to ensure idempotent masking.
entity_seed_columns:
  service-user: "id"
  # Add further entities with their unique identifier columns here
